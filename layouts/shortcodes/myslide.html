{{ if .IsNamedParams }}
<div style="position:relative;width:100%;padding-top:62.5%;">
  <iframe src="/{{ .Get "base" }}/slides/{{ .Get "name" }}.html"
          style="position:absolute; top:0; left:0;
                 width:200%;  /* 0.5倍にするなら、幅を2倍(200%)にする */
                 height:200%; /* 高さも2倍(200%)にする */
                 transform: scale(0.5); /* ここで半分に縮小 */
                 transform-origin: 0 0;" /* 左上を起点に縮小 */
	  frameborder="0"
          allowfullscreen>
  </iframe>
</div>
<ul>
  <li><a href="/{{ .Get "base" }}/slides/{{ .Get "name" }}.html">full size</a></li>
</ul>
{{ else }}
<div style="position:relative;width:100%;padding-top:62.5%;">
  <iframe src="{{ .Get 0 }}"
	  style="position:absolute;width:100%;height:100%;top:0;"
	  frameborder="0"
          allowfullscreen>
  </iframe>
</div>
<ul>
  <li><a href="{{ .Get 0 }}">full size</a></li>
</ul>
{{ end }}
